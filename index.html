<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Born to Host — Icon Graphical Breakdown</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 100vw;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 50%, #152438 0%, #0b121f 60%, #05080f 100%);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Blueprint Tech Grid Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0, 180, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 180, 255, 0.025) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 1;
  }

  /* Main Container Layout */
  .dashboard {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1200px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 50px;
    align-items: center;
    padding: 40px;
  }

  @media (max-width: 900px) {
    .dashboard { grid-template-columns: 1fr; gap: 40px; padding: 20px; }
  }

  /* Left Column: Icon & Architecture Specs */
  .left-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #7995b3;
    margin-bottom: 40px;
    text-transform: uppercase;
  }

  /* THE PREMIUM BTH ICON */
  .icon-wrapper {
    position: relative;
    width: 340px;
    height: 340px;
    border-radius: 80px;
    background: radial-gradient(ellipse at 50% 25%, #1d4673 0%, #0c2042 45%, #050d1d 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 
      0 0 0 2px rgba(0, 225, 255, 0.4),
      0 0 30px rgba(0, 160, 255, 0.4),
      0 0 90px rgba(0, 110, 255, 0.2),
      inset 0 0 40px rgba(0, 110, 255, 0.15);
  }

  /* Inner Ring Line */
  .icon-wrapper::after {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 73px;
    border: 1px solid rgba(0, 225, 255, 0.18);
    pointer-events: none;
  }

  /* Glassmorphism Top Curved Gloss */
  .icon-glass {
    position: absolute;
    top: 0; left: 0; right: 0; height: 50%;
    border-radius: 80px 80px 50% 50%;
    background: linear-gradient(175deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 40%, transparent 100%);
    pointer-events: none;
  }

  /* SVG Typography for Balanced Kerning */
  .icon-brand-svg {
    width: 280px;
    height: 120px;
    margin-bottom: 15px;
  }

  /* Scan / Divider Line */
  .icon-divider {
    width: 220px;
    height: 2px;
    background: linear-gradient(90deg, #00ffc4 0%, #00e5ff 40%, #0088ff 75%, #0055cc 100%);
    position: relative;
    margin-bottom: 15px;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
  }
  .dot-l, .dot-r {
    position: absolute; width: 8px; height: 8px; border-radius: 50%; top: 50%; transform: translateY(-50%);
  }
  .dot-l { left: -4px; background: #00ffc4; box-shadow: 0 0 8px #00ffc4; }
  .dot-r { right: -4px; background: #0088ff; box-shadow: 0 0 8px #0088ff; }

  /* Subtitle OBSERVATION */
  .icon-subtitle {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 8px;
    color: #aae5f5;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
    margin-bottom: 20px;
  }

  /* Three Pagination Dots */
  .icon-dots { display: flex; gap: 12px; }
  .icon-dots span { width: 7px; height: 7px; border-radius: 50%; background: #0055cc; }
  .icon-dots span:nth-child(2) { background: #00e5ff; transform: scale(1.3); box-shadow: 0 0 8px #00e5ff; }

  /* Right Column: JSON Code Block Terminal */
  .right-panel {
    display: flex;
    flex-direction: column;
  }

  .terminal-box {
    background: rgba(6, 11, 21, 0.65);
    border: 1px solid rgba(0, 180, 255, 0.15);
    border-radius: 16px;
    padding: 30px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
    line-height: 1.6;
    color: #a4bcd5;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,120,255,0.05);
    backdrop-filter: blur(10px);
    position: relative;
  }

  .html-tag { color: #569cd6; }
  .json-key { color: #9cdcfe; }
  .json-string { color: #ce9178; }
  .json-attr { color: #b5cea8; }

  /* Vercel Action Button Indicator */
  .vercel-badge {
    position: absolute;
    bottom: 25px;
    right: 25px;
    width: 32px;
    height: 32px;
    background: #000000;
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 12px rgba(0, 180, 255, 0.2);
  }

    border-right: 7px solid transparent;
    border-bottom: 12
