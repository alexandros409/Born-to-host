<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050816;
  font-family:'Space Grotesk',sans-serif;
}

.logo-wrap{
  width:420px;
  height:420px;
  border-radius:88px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top,#1a1f4d 0%,#0a0f26 40%,#050816 100%);

  box-shadow:
    0 0 40px rgba(122,92,255,.18),
    inset 0 0 80px rgba(0,209,255,.05);
}

.logo-wrap::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.12) 0%,
      rgba(255,255,255,.02) 35%,
      transparent 60%
    );
}

.center-glow{
  position:absolute;
  width:240px;
  height:240px;
  border-radius:50%;
  left:50%;
  top:42%;
  transform:translate(-50%,-50%);

  background:radial-gradient(
    circle,
    rgba(255,79,216,.22) 0%,
    rgba(122,92,255,.10) 40%,
    transparent 72%
  );

  filter:blur(24px);
}

.brand{
  position:absolute;
  top:42%;
  left:50%;
  transform:translate(-50%,-50%);

  font-size:122px;
  font-weight:700;
  letter-spacing:-8px;

  background:linear-gradient(135deg,#00D1FF,#7A5CFF,#FF4FD8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 12px rgba(122,92,255,.25);
}

.scan-line{
  position:absolute;
  width:280px;
  height:1px;
  left:50%;
  top:61%;
  transform:translateX(-50%);

  background:linear-gradient(
    90deg,
    transparent,
    #00D1FF,
    #FF4FD8,
    transparent
  );

  opacity:.7;
}

.scan-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  position:absolute;
  top:-2px;
  right:48px;
  background:#00D1FF;

  box-shadow:0 0 12px #00D1FF;
}

.subtitle{
  position:absolute;
  width:100%;
  top:68%;
  text-align:center;

  color:#B7BDE8;
  font-size:18px;
  letter-spacing:10px;
  font-weight:300;
}

.data-points{
  position:absolute;
  width:100%;
  bottom:62px;
  display:flex;
  justify-content:center;
  gap:22px;
}

.data-points span{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#7A5CFF;

  box-shadow:0 0 10px rgba(122,92,255,.7);
}

.data-points span:nth-child(2){
  background:#FF4FD8;
  transform:scale(1.3);
}

.data-points span:nth-child(3){
  background:#00D1FF;
}

</style>
</head>

<body>

<div class="logo-wrap">

  <div class="center-glow"></div>

  <div class="brand">BtH</div>

  <div class="scan-line">
    <div class="scan-dot"></div>
  </div>

  <div class="subtitle">OBSERVATION</div>

  <div class="data-points">
    <span></span>
    <span></span>
    <span></span>
  </div>

</div>

</body>
</html>
