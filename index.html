<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background: #0b0c10; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 40px; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .label { color: #a4b3c6; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; text-align: center; font-weight: 600; }
  .variant { display: flex; flex-direction: column; align-items: center; background: #13151a; padding: 25px; r_x: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<div class="variant">
  <div class="label">Born to Host — Platinum Gold</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="220" height="220">
    <defs>
      <linearGradient id="bgGold" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#0d0d0d"/>
        <stop offset="50%" style="stop-color:#141414"/>
        <stop offset="100%" style="stop-color:#050505"/>
      </linearGradient>
      <linearGradient id="glossGold" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
        <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.02"/>
        <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
      </linearGradient>
      <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ffeead"/>
        <stop offset="50%" style="stop-color:#caa455"/>
        <stop offset="100%" style="stop-color:#9a7432"/>
      </linearGradient>
      <radialGradient id="pulseGold" cx="50%" cy="46%" r="45%">
        <stop offset="0%" style="stop-color:#caa455;stop-opacity:0.15"/>
        <stop offset="100%" style="stop-color:#caa455;stop-opacity:0"/>
      </radialGradient>
      <filter id="glowG1"><feGaussianBlur stdDeviation="15" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glowG2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <clipPath id="clipG"><rect width="512" height="512" rx="120" ry="120"/></clipPath>
    </defs>
    
    <rect width="512" height="512" rx="120" ry="120" fill="url(#bgGold)"/>
    <rect width="512" height="512" rx="120" ry="120" fill="url(#pulseGold)"/>
    <rect width="504" height="504" x="4" y="4" rx="116" ry="116" fill="none" stroke="url(#textGold)" stroke-width="1.5" opacity="0.25"/>
    
    <ellipse cx="256" cy="90" rx="240" ry="100" fill="url(#glossGold)" clip-path="url(#clipG)"/>
    
    <text x="256" y="285" font-family="'Times New Roman', Georgia, serif" font-size="160" font-weight="bold" font-style="italic" fill="url(#textGold)" text-anchor="middle" filter="url(#glowG2)">BtH</text>
    
    <line x1="120" y1="320" x2="392" y2="320" stroke="url(#textGold)" stroke-width="1" opacity="0.4"/>
    <circle cx="256" cy="320" r="3" fill="#ffeead" opacity="0.7"/>
    
    <text x="256" y="375" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#caa455" text-anchor="middle" letter-spacing="14" opacity="0.9">OBSERVATION</text>
    <text x="256" y="415" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#ffeead" text-anchor="middle" letter-spacing="6" opacity="0.4">HUMAN EXPERIENCE</text>
  </svg>
</div>

<div class="variant">
  <div class="label">Born to Host — Ice Platinum</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="220" height="220">
    <defs>
      <linearGradient id="bgIce" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#050b14"/>
        <stop offset="50%" style="stop-color:#0a111e"/>
        <stop offset="100%" style="stop-color:#02050a"/>
      </linearGradient>
      <linearGradient id="textIce" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ffffff"/>
        <stop offset="50%" style="stop-color:#82b1ff"/>
        <stop offset="100%" style="stop-color:#2979ff"/>
      </linearGradient>
      <radialGradient id="pulseIce" cx="50%" cy="46%" r="42%">
        <stop offset="0%" style="stop-color:#82b1ff;stop-opacity:0.18"/>
        <stop offset="100%" style="stop-color:#82b1ff;stop-opacity:0"/>
      </radialGradient>
      <filter id="glowI"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <clipPath id="clipI"><rect width="512" height="512" rx="120" ry="120"/></clipPath>
    </defs>
    
    <rect width="512" height="512" rx="120" ry="120" fill="url(#bgIce)"/>
    <rect width="512" height="512" rx="120" ry="120" fill="url(#pulseIce)"/>
    <rect width="504" height="504" x="4" y="4" rx="116" ry="116" fill="none" stroke="url(#textIce)" stroke-width="1" opacity="0.2"/>
    
    <ellipse cx="256" cy="90" rx="240" ry="100" fill="url(#glossGold)" clip-path="url(#clipI)"/>
    
    <text x="256" y="280" font-family="'Futura', 'Helvetica Neue', Arial, sans-serif" font-size="150" font-weight="300" fill="url(#textIce)" text-anchor="middle" letter-spacing="2" filter="url(#glowI)">BtH</text>
    
    <line x1="140" y1="320" x2="372" y2="320" stroke="url(#textIce)" stroke-width="1" opacity="0.3"/>
    
    <text x="256" y="375" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="16" opacity="0.95">OBSERVATION</text>
    <text x="256" y="415" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#82b1ff" text-anchor="middle" letter-spacing="8" opacity="0.6">ARCHIVE</text>
  </svg>
</div>

</body>
</html>
